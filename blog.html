<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Blog — Yvonne Georgina</title>
        <meta name="application-name" content="Yvonne Georgina" />
        <meta name="apple-mobile-web-app-title" content="Yvonne Georgina" />
        <meta
            name="description"
            content="Notes and occasional writing from Yvonne Georgina."
        />
        <link rel="icon" href="favicon.svg" type="image/svg+xml" />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                padding: 40px;
                background-color: #ffffff;
                color: #000000;
                font-family: "Helvetica", Arial, sans-serif;
                font-size: 12pt;
                line-height: 1.5;
            }

            .container {
                width: 100%;
                max-width: 560px;
            }

            .site-title {
                margin-bottom: 48px;
                font-size: 24px;
                line-height: 1.2;
            }

            .site-title a {
                color: #000000;
                text-decoration: none;
            }

            .blog-image {
                display: block;
                width: 100%;
                height: auto;
                margin-bottom: 40px;
            }

            main {
                margin-bottom: 48px;
            }

            h2 {
                margin-bottom: 12px;
                font-size: 20px;
                line-height: 1.3;
            }

            .introduction {
                max-width: 430px;
                margin-bottom: 40px;
            }

            .posts {
                border-top: 1px solid #000000;
            }

            .empty-state {
                padding: 18px 0;
                border-bottom: 1px solid #000000;
            }

            .back-link {
                color: #000000;
                text-decoration: underline;
            }

            .back-link:hover,
            .back-link:focus-visible {
                text-decoration-thickness: 2px;
            }

            @media (max-width: 600px) {
                body {
                    padding: 24px 20px;
                }

                .site-title {
                    margin-bottom: 40px;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1 class="site-title">
                    <a href="index.html">Yvonne Georgina</a>
                </h1>
            </header>

            <img
                class="blog-image"
                src="images/IMG_7706.jpeg"
                alt="What would Walt Whitman do?"
            />

            <main>
                <h2>Blog</h2>
                <p class="introduction">
                    Notes, observations, and other things I’m curious about.
                </p>

                <section class="posts" aria-label="Blog posts">
                    <p class="empty-state">First post coming soon.</p>
                </section>
            </main>

            <footer>
                <a class="back-link" href="index.html">Back to home</a>
            </footer>
        </div>
    </body>
</html>
